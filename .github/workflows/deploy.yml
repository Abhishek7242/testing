name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          
          # This should be the root folder of your domain on Hostinger (which contains public_html). 
          # You may need to change this depending on your Hostinger FTP path.
          # Often it's `/` or `/public_html/` depending on the FTP user.
          # If your FTP user is specifically for this domain, `/` might be correct.
          # If it's a general account, it might be `/domains/yourdomain.com/`
          server-dir: /
          
          # Don't upload git files or the workflow itself
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*/**
            **/node_modules/**
            **/laravel-core/storage/framework/cache/data/**
